# Public TLS reverse proxy for fable Label Studio (VPS).
# Listens on 8081 SSL; backends only to loopback Label Studio (127.0.0.1:8082).
# Certificate: self-signed with IP SAN 103.214.174.58 (browser warning expected).
# Deployed to: /etc/nginx/sites-available/fable-label-studio
#              /etc/nginx/sites-enabled/fable-label-studio

server {
    listen 8081 ssl;
    listen [::]:8081 ssl;
    server_name 103.214.174.58;

    ssl_certificate     /etc/ssl/fable/label-studio.crt;
    ssl_certificate_key /etc/ssl/fable/label-studio.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        # WebSocket / long-poll friendliness for Label Studio UI
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
