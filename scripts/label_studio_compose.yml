# Label Studio for fable YOLO label review (isolated).
# Usage (from repo root):
#   docker compose -f scripts/label_studio_compose.yml up -d
# Open: http://127.0.0.1:8081
# First visit: create local account (stored only in label_studio_data volume).
#
# Dataset is mounted read-only at /label-studio/files/dense_15m_full
# Prefer import via scripts/label_studio_prepare_import.py (JSON tasks).

services:
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: fable_label_studio
    ports:
      - "8081:8080"
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
      # Local-only bootstrap (override via env). Not for public VPS.
      - LABEL_STUDIO_USERNAME=${LABEL_STUDIO_USERNAME:-fable-review@example.com}
      - LABEL_STUDIO_PASSWORD=${LABEL_STUDIO_PASSWORD:-fable-review-local}
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=true
    volumes:
      - ../label_studio_data:/label-studio/data
      - ../datasets:/label-studio/files:ro
    restart: unless-stopped
