<h1>E2 对照：长段收核（这回肉眼应该能看清）</h1>
<p>
<span style="color:#e85">红框</span> = 旧规则（dense 多长就画多长，PAXG 曾 74 根）。
<span style="color:#3c8">绿框</span> = E2：超过 <code>MAX_DENSE_BARS=24</code> 的 run 收到最紧 24 根。
E1 只缩 12px 边距几乎看不见；E2 改的是 <b>对象长度</b>。
普通审计页 <code>/label_audit.html</code> 现在只画绿框（已是 E2）。
</p>
