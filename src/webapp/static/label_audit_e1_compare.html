<h1>E1 对照页：为什么普通审计页「看起来没变」</h1>
<p>
<span class="badge warn">重要</span>
E1 只把水平 padding 从 12px 收到 6px，整框宽度只少 <b>12 像素</b>（1280 宽图上约 0.9%）。
在审计页缩略图（宽约 660px）上大约只少 <b>6 像素</b>，和绿框描边一样粗，肉眼几乎看不出。
本页把 <b style="color:#e85">旧 pad12 用红框</b>、<b style="color:#3c8">新 pad6 用绿框</b> 叠在同一张图上，红绿差开的那一圈才是 E1 的真实改动。
当前代码 <code>X_PAD_PX=6</code>；普通审计页只画绿框（已是 pad6），没有红框对照。
</p>
