function paint(ch) {

      topColor:'rgba(34,211,238,0.35)', bottomColor:'rgba(34,211,238,0.05)',
      lineColor:'rgba(34,211,238,0.8)', lineWidth:1,
      priceLineVisible:false, lastValueVisible:false,

    });

      { time: ch.band.from, value: mid },
      { time: ch.band.to, value: mid },
    ]);

}
