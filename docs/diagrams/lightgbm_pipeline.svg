<svg viewBox="0 0 700 976" xmlns="http://www.w3.org/2000/svg"><style>
text{font-family:-apple-system,'PingFang SC',sans-serif;font-size:14px;fill:#3a3a36}
.t{font-size:14px}.ts{font-size:12px;fill:#6b6a64}.th{font-size:16px;font-weight:600}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}.c-gray text{fill:#2C2C2A}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}.c-purple text{fill:#3C3489}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-teal text{fill:#085041}
.c-coral rect{fill:#FAECE7;stroke:#993C1D}.c-coral text{fill:#712B13}
.c-purple .ts,.c-teal .ts,.c-coral .ts,.c-gray .ts{fill:inherit;opacity:.75}
</style>

<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#888780"/></marker></defs>
<text x="20" y="24" class="ts">紫 = 计算步骤 · 青 = 模型与输出 · 珊瑚 = 纪律关卡</text>
<g class="c-gray"><rect x="20" y="40" width="400" height="60" rx="6"/><text x="40" y="66" class="t">① 数据：56 币种 × 400 天 15m K 线</text><text x="40" y="86" class="ts">OHLCV + 成交量，约 220 万根，loader 合并去重</text></g><line x1="220" y1="100" x2="220" y2="126" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-purple"><rect x="20" y="130" width="400" height="60" rx="6"/><text x="40" y="156" class="t">② 指标计算</text><text x="40" y="176" class="ts">EMA 8/13/21/34/55/144/200 · ATR14 · 量比</text></g><line x1="220" y1="190" x2="220" y2="216" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-purple"><rect x="20" y="220" width="400" height="60" rx="6"/><text x="40" y="246" class="t">③ 密集候选扫描（规则，非模型）</text><text x="40" y="266" class="ts">12 项阈值判"均线收拢" · 同币间隔 ≥18 根</text></g><text x="440" y="246" class="ts">→ 10,255 个候选点</text><text x="440" y="264" class="ts">（13 个月 · 190 币种命中）</text><line x1="220" y1="280" x2="220" y2="306" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-purple"><rect x="20" y="310" width="400" height="60" rx="6"/><text x="40" y="336" class="t">④ triple-barrier 打标签（见另图）</text><text x="40" y="356" class="ts">先触止盈 = 1，先触止损或超时 = 0</text></g><text x="440" y="336" class="ts">正类率 ~35%</text><text x="440" y="354" class="ts">标签允许看未来，特征不许</text><line x1="220" y1="370" x2="220" y2="396" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-purple"><rect x="20" y="400" width="400" height="60" rx="6"/><text x="40" y="426" class="t">⑤ 28 维特征（严格无前视）</text><text x="40" y="446" class="ts">均线间距 · 量能 z · 波动位置 · 动量 · 与慢线距离</text></g><line x1="220" y1="460" x2="220" y2="486" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-coral"><rect x="20" y="490" width="400" height="72" rx="6"/><text x="40" y="516" class="t">⑥ 按时间三段切分（纪律关卡）</text><text x="40" y="536" class="ts">train 6,367 → val 1,598 → holdout 2,214（封存）</text><text x="40" y="554" class="ts">每个边界清除 73 根，防标签窗口泄漏</text></g><line x1="220" y1="562" x2="220" y2="588" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-teal"><rect x="20" y="592" width="400" height="60" rx="6"/><text x="40" y="618" class="t">⑦ LightGBM 二分类训练</text><text x="40" y="638" class="ts">梯度提升树 · 早停盯 val · 收敛于 ~20 棵 × 15 叶</text></g><text x="440" y="618" class="ts">学的是"哪种密集更可能</text><text x="440" y="636" class="ts">先碰到止盈"的排序能力</text><line x1="220" y1="652" x2="220" y2="678" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-teal"><rect x="20" y="682" width="400" height="60" rx="6"/><text x="40" y="708" class="t">⑧ 打分 + 事前锁定阈值</text><text x="40" y="728" class="ts">每个候选得 0~1 分 · 阈值 = val 90 分位 = 0.424</text></g><text x="440" y="708" class="ts">高于阈值才是交易信号</text><text x="440" y="726" class="ts">锁定后不许再动（防偷看）</text><line x1="220" y1="742" x2="220" y2="768" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-coral"><rect x="20" y="772" width="400" height="72" rx="6"/><text x="40" y="798" class="t">⑨ 统计闸门（过不了就回炉）</text><text x="40" y="818" class="ts">置换检验 p&lt;0.01 · 必须赢过单特征基线</text><text x="40" y="836" class="ts">实测：AUC 0.565 / p=0.001 / 基线 0.462</text></g><line x1="220" y1="844" x2="220" y2="870" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><g class="c-teal"><rect x="20" y="874" width="400" height="72" rx="6"/><text x="40" y="900" class="t">⑩ 组合回测（阶段 3）</text><text x="40" y="920" class="ts">等权 · 同币锁仓 · ≤10 并发 · 三档成本扫描</text><text x="40" y="938" class="ts">产出 PF / 回撤 / 净值曲线 → 看板</text></g><text x="440" y="900" class="ts">当前卡在这里：PF 1.27</text><text x="440" y="918" class="ts">（maker）vs 验收线 1.3</text></svg>