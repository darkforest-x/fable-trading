<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg"><style>
text{font-family:-apple-system,'PingFang SC',sans-serif;font-size:14px;fill:#3a3a36}
.t{font-size:14px}.ts{font-size:12px;fill:#6b6a64}.th{font-size:16px;font-weight:600}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}.c-gray text{fill:#2C2C2A}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}.c-purple text{fill:#3C3489}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-teal text{fill:#085041}
.c-coral rect{fill:#FAECE7;stroke:#993C1D}.c-coral text{fill:#712B13}
.c-purple .ts,.c-teal .ts,.c-coral .ts,.c-gray .ts{fill:inherit;opacity:.75}
</style>

<rect x="50" y="60" width="90" height="240" fill="rgba(57,135,229,0.14)"/>
<text x="55" y="52" class="ts">均线密集区</text>
<line x1="60" y1="100" x2="610" y2="100" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="615" y="96" class="ts" fill="#0F6E56">止盈</text><text x="615" y="112" class="ts" fill="#0F6E56">+5×ATR</text>
<line x1="60" y1="210" x2="610" y2="210" stroke="#888780" stroke-width="1" stroke-dasharray="3 3"/>
<text x="615" y="207" class="ts">入场价</text><text x="615" y="223" class="ts">(次根开盘)</text>
<line x1="60" y1="290" x2="610" y2="290" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="615" y="287" class="ts" fill="#A32D2D">止损</text><text x="615" y="303" class="ts" fill="#A32D2D">-2×ATR</text>
<line x1="560" y1="70" x2="560" y2="320" stroke="#888780" stroke-width="1.5" stroke-dasharray="2 4"/>
<text x="555" y="340" class="ts" text-anchor="middle">72 根超时（18 小时）</text>
<circle cx="140" cy="210" r="5" fill="#7F77DD"/><text x="140" y="245" class="ts" text-anchor="middle">信号确认</text>
<circle cx="162" cy="208" r="5" fill="#1D9E75"/><text x="168" y="235" class="ts">入场</text>
<path d="M 162 208 L 200 226 L 238 196 L 276 216 L 314 170 L 352 186 L 390 140 L 420 100" fill="none" stroke="#1D9E75" stroke-width="2.5"/>
<circle cx="420" cy="100" r="6" fill="#1D9E75"/>
<text x="420" y="82" class="t" text-anchor="middle" fill="#0F6E56">先触止盈 → label = 1</text>
<path d="M 162 208 L 200 230 L 238 250 L 268 290" fill="none" stroke="#E24B4A" stroke-width="2" stroke-dasharray="5 3"/>
<circle cx="268" cy="290" r="5" fill="#E24B4A"/>
<text x="268" y="316" class="ts" text-anchor="middle" fill="#A32D2D">先触止损 → label = 0</text>
<path d="M 162 208 L 240 200 L 330 224 L 440 204 L 560 218" fill="none" stroke="#888780" stroke-width="2" stroke-dasharray="2 3"/>
<circle cx="560" cy="218" r="5" fill="#888780"/>
<text x="470" y="248" class="ts">哪条线都没碰 → 超时按收盘价，label = 0</text>
<text x="60" y="376" class="ts">保守规则：同根 K 线同时触两线（顺序不可知）→ 一律按止损记；入场用信号次根开盘，杜绝前视。</text>
</svg>